name: numero
description: "Numero — a Duolingo-style mathematics learning app for ages 10 to university level."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State management ─────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Routing ──────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Theming ──────────────────────────────────────────────
  dynamic_color: ^1.7.0          # M3 dynamic colour from Android wallpaper

  # ── Animation & motion ───────────────────────────────────
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10+1

  # ── Maths rendering ──────────────────────────────────────
  flutter_math_fork: ^0.7.3       # STIX Two Math equations (used later)

  # ── Persistence ──────────────────────────────────────────
  shared_preferences: ^2.2.3      # settings, theme, streak
  sqflite: ^2.3.3                 # progress, FSRS data
  path: ^1.9.0
  path_provider: ^2.1.3

  # ── Audio & feedback ─────────────────────────────────────
  audioplayers: ^6.0.0

  # ── Notifications & home widget ──────────────────────────
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  home_widget: ^0.6.0

  # ── Misc UI ──────────────────────────────────────────────
  confetti: ^0.7.0
  url_launcher: ^6.3.0            # opens email + privacy policy
  package_info_plus: ^8.0.0       # app version in settings

  # ── Utilities ────────────────────────────────────────────
  collection: ^1.18.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/icon/numero_icon.svg
    - assets/sounds/

  # The STIX Two Math font is referenced by flutter_math_fork for equations.
  # Drop the .otf/.ttf files into assets/fonts/stix/ when content work begins.
  # fonts:
  #   - family: STIXTwoMath
  #     fonts:
  #       - asset: assets/fonts/stix/STIXTwoMath-Regular.otf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/numero_icon.svg"
  min_sdk_android: 26
  adaptive_icon_background: "#4A5AFA"
  adaptive_icon_foreground: "assets/icon/numero_icon.svg"
